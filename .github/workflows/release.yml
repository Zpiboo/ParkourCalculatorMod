name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-24.04
    steps:
      - name: checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: validate gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: setup jdks
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: |
            8
            21

      - name: make gradle wrapper executable
        run: chmod +x ./gradlew

      - name: derive version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: build
        run: ./gradlew build -x tableStyleCheck -PreleaseVersion=${{ steps.version.outputs.version }} -Dorg.gradle.java.home="$JAVA_HOME"

      - name: create github release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            loader-fabric-1.21.10/build/libs/pkc-fabric-1.21.10-${{ steps.version.outputs.version }}.jar
            loader-forge-1.8.9/build/libs/pkc-forge-1.8.9-${{ steps.version.outputs.version }}.jar
            loader-forge-1.12.2/build/libs/pkc-forge-1.12.2-${{ steps.version.outputs.version }}.jar
          prerelease: ${{ contains(github.ref_name, '-') }}
