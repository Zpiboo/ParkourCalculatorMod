name: Feature request
description: Suggest a new feature or improvement.
title: "feat: <short description>"
labels: ["feature"]
body:
  - type: textarea
    id: summary
    attributes:
      label: What and why
      description: What should the tool do, and what problem does it solve?
    validations:
      required: true

  - type: textarea
    id: done
    attributes:
      label: Done when (optional)
      description: Concrete signs it is finished. Note anything explicitly out of scope.
      value: |
        -

  - type: checkboxes
    id: modules
    attributes:
      label: Affected modules (optional)
      options:
        - label: core
        - label: forge-core
        - label: loader-fabric-1.21.10
        - label: loader-forge-1.8.9
        - label: loader-forge-1.12.2

  - type: textarea
    id: context
    attributes:
      label: Anything else (optional)
      description: Mockups, references, related strats, prior art.
