name: Bug report
description: Something is broken. Reproducible reports get fixed faster.
title: "<short description of what is wrong>"
labels: ["bug"]
body:
  - type: dropdown
    id: loader
    attributes:
      label: Loader
      options:
        - "Fabric 1.21.10"
        - "Forge 1.8.9"
        - "Forge 1.12.2"
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Mod version
      description: From the jar filename, e.g. 0.2.0 or 0.1.0+build.29.98dd306.
    validations:
      required: true

  - type: textarea
    id: what
    attributes:
      label: What happened
      description: What went wrong, and what you expected instead.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs or crash report (optional)
      description: Paste the relevant latest.log or crash report. Link a Gist for long ones.
      render: shell

  - type: textarea
    id: context
    attributes:
      label: Anything else (optional)
      description: Screenshots, other mods loaded, suspected cause, whether it worked in a previous version.
